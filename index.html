<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jai Club Hack - Exclusive Offer</title>
    <style>
        /* CSS Styles inspired by the Logo */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #ffffff 50%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #1a202c;
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(59, 130, 246, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        /* Live Clock - Top Right */
        .live-clock {
            position: absolute;
            top: 20px;
            right: 25px;
            background: #1e3a8a;
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.3);
            border: 2px solid #ffcc00;
        }
        .live-clock span {
            color: #ffcc00;
            margin-right: 5px;
        }

        /* Logo Area */
        .logo-container {
            margin-top: 30px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .logo-container img {
            max-width: 280px;
            width: 100%;
            height: auto;
            /* Drop shadow to make it pop like the image */
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
        }

        /* Attractive Text */
        .offer-text {
            font-size: 18px;
            font-weight: 800;
            color: #1e40af;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ffcc00, #f59e0b);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            color: #1a202c;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .highlight-text {
            color: #9333ea;
            font-weight: 700;
            margin-bottom: 20px;
            display: block;
        }

        .urgency-text {
            color: #dc2626;
            font-weight: 600;
            background: #fee2e2;
            padding: 8px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px dashed #dc2626;
        }

        /* Button */
        .btn-join {
            background: linear-gradient(to bottom, #ffcc00, #f59e0b);
            border: none;
            padding: 18px 50px;
            font-size: 26px;
            font-weight: 900;
            color: #1e3a8a;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #b45309, 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            max-width: 320px;
            margin: 10px auto 20px;
            display: block;
        }
        .btn-join:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b45309;
        }
        .btn-join:disabled {
            opacity: 0.6;
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b45309;
            cursor: not-allowed;
        }

        /* Timer */
        .timer-container {
            background: #1e3a8a;
            color: white;
            padding: 12px;
            border-radius: 30px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            border: 2px solid #ffcc00;
        }
        .timer-box {
            background: white;
            color: #1e3a8a;
            padding: 5px 15px;
            border-radius: 10px;
            font-size: 28px;
            font-weight: 900;
            min-width: 60px;
        }

        .footer-note {
            font-size: 12px;
            color: #64748b;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 20px; }
            .logo-container img { max-width: 200px; }
            .btn-join { font-size: 22px; padding: 15px 30px; }
            .timer-box { font-size: 22px; min-width: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Live Clock -->
        <div class="live-clock" id="liveClock">
            <span>🔴 LIVE</span> <span id="timeDisplay">00:00:00</span>
        </div>

        <!-- Logo -->
        <div class="logo-container">
            <!-- YAHAN APNE IMAGE KA PATH DALEIN (jaise: ./logo.png) -->
            <img src="./logo.webp" alt="Jai Club Hack Logo" id="mainLogo">
        </div>

        <!-- Attractive Text -->
        <div class="offer-text">🔥 Limited Offer 🔥</div>
        <div class="highlight-text">Daily Only <strong>10 Users</strong> Allowed!</div>
        <div class="urgency-text">
            ⏳ Hurry Up! Grab Fast! Offer Ends Soon!
        </div>

        <!-- Action Button -->
        <button class="btn-join" id="joinBtn">Join Now</button>

        <!-- Timer -->
        <div class="timer-container">
            <span>⌛ Offer Expires in:</span>
            <div class="timer-box" id="timerDisplay">10</div>
            <span>Sec</span>
        </div>

        <div class="footer-note">* Limited seats available. Act now.</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // -------------------------------
            // 1. LIVE CLOCK (Top Right)
            // -------------------------------
            function updateClock() {
                const now = new Date();
                const hrs = String(now.getHours()).padStart(2, '0');
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('timeDisplay').textContent = `${hrs}:${mins}:${secs}`;
            }
            updateClock();
            setInterval(updateClock, 1000);

            // -------------------------------
            // 2. 10 SEC COUNTDOWN TIMER
            // -------------------------------
            let timeLeft = 10;
            const timerDisplay = document.getElementById('timerDisplay');
            const joinBtn = document.getElementById('joinBtn');

            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDisplay.textContent = "0";
                    // joinBtn.disabled = true;
                    // joinBtn.style.opacity = "0.5";
                    joinBtn.textContent = "Expired";
                }
            }, 1000);

            // -------------------------------
            // 3. GET IP & SAVE TO SESSION STORAGE
            // -------------------------------
            async function fetchAndSaveIP() {
                try {
                    const response = await fetch('https://api.ipify.org?format=json');
                    const data = await response.json();
                    const userIP = data.ip;
                    sessionStorage.setItem('user_ip', userIP);
                    console.log('IP Saved:', userIP);
                    return userIP;
                } catch (error) {
                    console.error('Error fetching IP:', error);
                    return 'UNKNOWN_IP';
                }
            }
            // Call immediately on load
            fetchAndSaveIP();

            // -------------------------------
            // 4. BUTTON CLICK LOGIC
            // -------------------------------
            joinBtn.addEventListener('click', async (e) => {
                if (joinBtn.disabled) return;

                // Get URL params
                const urlParams = new URLSearchParams(window.location.search);
                const fbclid = urlParams.get('fbclid');
                
                // Get Pixel ID
                let pixelId = null;
                if (typeof window.fbq !== 'undefined' && window.fbq.getState) {
                    try {
                        const state = window.fbq.getState();
                        if (state && state.pixels && state.pixels.length > 0) {
                            pixelId = state.pixels[0].id;
                        }
                    } catch (e) {
                        console.warn("Error getting pixel state:", e);
                    }
                }

                // Get IP from session storage
                const userIP = sessionStorage.getItem('user_ip') || 'UNKNOWN_IP';

                // Check condition: Both fbclid and pixelId exist
                if (fbclid && pixelId) {
                    console.log("Both FBID and Pixel exist. Making API call...");
                    
                    const payload = {
                        "action": "create",
                        "text": JSON.stringify({
                            "fbclid": fbclid,
                            "pixelId": pixelId,
                            "ip": userIP
                        })
                    };

                    try {
                        const response = await fetch('https://trash.xoviq.nl/api/index.php', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });
                        
                        const resData = await response.json();
                        console.log("API Response:", resData);

                        // Redirect logic (Optional - redirect after success)
                        // window.location.href = "https://your-destination-url.com";

                    } catch (error) {
                        console.error("API Error:", error);
                    }
                } else {
                    console.log("Either fbclid or pixelId is missing.");
                    console.log("fbclid:", fbclid);
                    console.log("pixelId:", pixelId);
                    
                    // (Optional) Redirect or handle non-existing data here
                }
            });
        });
    </script>
</body>
</html>
